<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Generar Logo PNG Transparente</title>
    <style>
        body {
            background: #333;
            font-family: sans-serif;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        canvas {
            border: 1px solid #555;
            margin: 1rem auto;
            display: block;
            background: repeating-conic-gradient(#666 0% 25%, #444 0% 50%) 0/20px 20px;
        }

        button {
            margin-top: 1rem;
            padding: 0.8rem 2rem;
            background: #ff9d00;
            border: none;
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 6px;
        }

        p {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <h2>Logo La Galiciana → PNG Transparente</h2>
    <canvas id="c"></canvas>
    <br>
    <button onclick="descargar()">⬇️ Descargar logo-galiciana.png</button>
    <p>El fondo negro se elimina automáticamente. El damero gris muestra la transparencia.</p>

    <script>
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = 'brand-P2.webp';
        img.onload = () => {
            const canvas = document.getElementById('c');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.style.width = Math.min(img.naturalWidth, 900) + 'px';
            canvas.style.height = 'auto';

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Remove near-black pixels: if R+G+B < threshold, make transparent
            const threshold = 60; // tolerance for "black"
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i + 1], b = data[i + 2];
                const brightness = (r + g + b) / 3;
                if (brightness < threshold) {
                    data[i + 3] = 0; // fully transparent
                } else if (brightness < 100) {
                    // Semi-transparent near edges for smooth anti-aliasing
                    data[i + 3] = Math.round(((brightness - threshold) / (100 - threshold)) * 255);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        };
        img.onerror = () => alert('Error cargando brand-P2.webp — ábrelo desde un servidor local (archivo:// no permite CORS).');

        function descargar() {
            const canvas = document.getElementById('c');
            const link = document.createElement('a');
            link.download = 'logo-galiciana.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>

</html>
